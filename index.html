<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>
  
  <!-- Your CSS here -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  
  <!-- Preloader -->
<div id="preloader-overlay"></div>

<!-- Header Navigation -->
<div class="header">
  <div class="values-section">
    <h3 class="active-category-indicator" id="activeCategoryLabel">All Work</h3>
  </div>
</div>

<!-- Mobile hamburger button -->
<button class="hamburger-btn" id="hamburgerBtn" aria-label="Open menu">
  <span class="hamburger-line"></span>
  <span class="hamburger-line"></span>
</button>

<!-- Mobile menu overlay -->
<div class="mobile-menu-overlay" id="mobileMenuOverlay">
  <div class="mobile-menu-content">
    <nav class="mobile-menu-nav">
      <a href="index.html" class="mobile-menu-link">Gallery</a>
      <a href="about.html" class="mobile-menu-link">About</a>
      <a href="contact.html" class="mobile-menu-link">Contact</a>
    </nav>
  </div>
</div>

<!-- Category Index Overlay -->
<div class="category-index" id="categoryIndex">
  <button class="category-index-close" id="categoryIndexClose" aria-label="Close index">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <path d="M15 5L5 15M5 5l10 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>
  <div class="category-index-inner">
    <div class="category-list" id="categoryList">
      <!-- Built by JavaScript from GALLERY_CATEGORIES -->
    </div>
    <div class="category-preview" id="categoryPreview">
      <div class="category-preview-letter" id="categoryPreviewLetter">✦</div>
      <img class="category-preview-img" id="categoryPreviewImg" src="" alt="">
    </div>
  </div>
  <div class="category-index-footer">
    <div class="category-index-nav">
      <a href="about.html">About</a>
      <span class="category-index-sep">/</span>
      <a href="contact.html">Contact</a>
    </div>
    <p class="category-index-coords">44.4385° N, 26.0515° E</p>
  </div>
</div>

<!-- Main Viewport -->
<div class="viewport" id="viewport">
  <div class="canvas-wrapper" id="canvasWrapper">
    <div class="grid-container" id="gridContainer">
      <!-- Grid items will be generated by JavaScript -->
    </div>
  </div>
</div>

<!-- Split Screen Container -->
<div class="split-screen-container" id="splitScreenContainer">
  <div class="split-left" id="splitLeft">
    <div class="zoom-target" id="zoomTarget"></div>
  </div>
  <div class="split-right" id="splitRight">
    <!-- Right panel content -->
  </div>
</div>

<!-- Image Title Overlay -->
<div class="image-title-overlay" id="imageTitleOverlay">
  <div class="image-slide-number" id="imageSlideNumber">
    <span>01</span>
  </div>
  <div class="image-slide-title" id="imageSlideTitle">
    <h1>Fashion Portrait</h1>
  </div>
  <div class="image-slide-description" id="imageSlideDescription">
    <!-- Lines will be generated dynamically -->
  </div>
</div>

<!-- Simple 64px white arrow button -->
<button class="close-button" id="closeButton">
  <svg width="64" height="64" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M7.89873 16L6.35949 14.48L11.8278 9.08H0V6.92H11.8278L6.35949 1.52L7.89873 0L16 8L7.89873 16Z" fill="white" />
  </svg>
</button>

<!-- Controls Container -->
<div class="controls-container" id="controlsContainer">
  <div class="percentage-indicator" id="percentageIndicator">
    60%
  </div>
  <div class="switch" id="controls">
    <button class="switch-button switch-button-current" onclick="gallery.setZoom(0.6, this)">
      <span class="indicator-dot"></span>
      NORMAL
    </button>
    <button class="switch-button" onclick="gallery.setZoom(1.0, this)">
      <span class="indicator-dot"></span>
      ZOOM IN
    </button>
    <button class="switch-button" onclick="gallery.autoFitZoom(this)">
      <span class="indicator-dot"></span>
      FIT
    </button>
  </div>
  <button class="sound-toggle active" id="soundToggle">
    <canvas class="sound-wave-canvas" id="soundWaveCanvas" width="32" height="16"></canvas>
  </button>
</div>

<!-- Footer Navigation -->
<div class="footer">
  <div class="info-section">
    <p>2026 • Bucharest</p>
    <p>44.4385° N, 26.0515° E</p>
  </div>
</div>

<!-- Page vignette effects -->
<div class="page-vignette-container">
  <div class="page-vignette-extreme"></div>
</div>
  
  <!-- GSAP Dependencies - ADD THESE -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/CustomEase.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Flip.min.js"></script>
  
  <!-- Gallery Configuration -->
  <script src="gallery-config.js"></script>
  
  <!-- Your JavaScript -->
  <script src="scripts.js"></script>
</body>
</html>
